<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <style>
    :root {
      --bg0:#2A1C13; --bg1:#1A1209; --bg2:#0E0A06;
      --m0:#FBC494; --m1:#F4A05F; --m2:#E87E3A; --m3:#D55A26; --m4:#A8331A;
      --ink:#0B0A08; --sheen:0.35; --shade:0.55;
    }
    .dark {
      --bg0:#15100B; --bg1:#0B0907; --bg2:#000000;
      --m0:#E89A63; --m1:#DB8047; --m2:#CC6730; --m3:#B14D22; --m4:#8C2C16;
      --ink:#070605; --sheen:0.22; --shade:0.62;
    }
    .tinted {
      --bg0:#1C1C1E; --bg1:#121214; --bg2:#0A0A0B;
      --m0:#FFFFFF; --m1:#E2E2E2; --m2:#C2C2C2; --m3:#9C9C9C; --m4:#6E6E6E;
      --ink:#0A0A0B; --sheen:0.30; --shade:0.45;
    }
  </style>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="var(--bg0)"/>
      <stop offset="55%" stop-color="var(--bg1)"/>
      <stop offset="100%" stop-color="var(--bg2)"/>
    </radialGradient>
    <linearGradient id="copper" x1="80%" y1="4%" x2="18%" y2="100%">
      <stop offset="0%" stop-color="var(--m0)"/>
      <stop offset="18%" stop-color="var(--m1)"/>
      <stop offset="42%" stop-color="var(--m2)"/>
      <stop offset="68%" stop-color="var(--m3)"/>
      <stop offset="100%" stop-color="var(--m4)"/>
    </linearGradient>
    <linearGradient id="innerShade" x1="40%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="72%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="var(--shade)"/>
    </linearGradient>
    <linearGradient id="sheen" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="var(--sheen)"/>
      <stop offset="18%" stop-color="#FFF" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="patFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="84%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="patMask"><rect width="1024" height="1024" fill="url(#patFade)"/></mask>

    <!-- denser tribal column: double teeth rails + chevrons + diamonds -->
    <pattern id="tribal" width="120" height="96" patternUnits="userSpaceOnUse">
      <path d="M0 0 L19 9 L0 18 Z M0 18 L19 27 L0 36 Z M0 36 L19 45 L0 54 Z M0 54 L19 63 L0 72 Z M0 72 L19 81 L0 90 Z M0 90 L19 99 L0 108 Z" fill="var(--ink)"/>
      <path d="M120 0 L101 9 L120 18 Z M120 18 L101 27 L120 36 Z M120 36 L101 45 L120 54 Z M120 54 L101 63 L120 72 Z M120 72 L101 81 L120 90 Z M120 90 L101 99 L120 108 Z" fill="var(--ink)"/>
      <path d="M34 4 L60 24 L86 4 L86 18 L60 38 L34 18 Z" fill="var(--ink)"/>
      <path d="M34 52 L60 72 L86 52 L86 66 L60 86 L34 66 Z" fill="var(--ink)"/>
      <path d="M60 38 L69 47 L60 56 L51 47 Z" fill="var(--ink)"/>
      <path d="M28 30 L33 35 L28 40 L23 35 Z M92 30 L97 35 L92 40 L87 35 Z" fill="var(--ink)"/>
    </pattern>

    <g id="koru">
      <path d="M0 0 a52 52 0 1 0 52 52 a32 32 0 1 1 -32 -32 a15 15 0 1 0 15 15"
            fill="none" stroke="var(--ink)" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g id="sun">
      <g stroke="var(--ink)" stroke-width="7" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-30"/><line x1="0" y1="0" x2="21" y2="-21"/>
        <line x1="0" y1="0" x2="30" y2="0"/><line x1="0" y1="0" x2="21" y2="21"/>
        <line x1="0" y1="0" x2="-21" y2="-21"/><line x1="0" y1="0" x2="-30" y2="0"/>
        <line x1="0" y1="0" x2="-21" y2="21"/>
      </g>
      <circle r="6" fill="var(--ink)"/>
    </g>

    <clipPath id="rClip"><path transform="translate(82.41 872.00) scale(1.04651 -1.04651)" d="M594 288 747 0H499L377 251H295V0H74V688H495Q569 688 621.5 659.5Q674 631 700.5 582.5Q727 534 727 477Q727 414 693.0 363.0Q659 312 594 288ZM440 531H295V404H440Q466 404 484.0 422.5Q502 441 502 468Q502 495 484.0 513.0Q466 531 440 531Z"/></clipPath>
    <filter id="raise" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <g filter="url(#raise)">
    <g clip-path="url(#rClip)">
      <rect width="1024" height="1024" fill="url(#copper)"/>
      <g mask="url(#patMask)">
        <rect x="150" y="116" width="450" height="792" fill="url(#tribal)"/>
    <use href="#koru" transform="translate(250 300) rotate(0) scale(1.0)"/>
    <use href="#koru" transform="translate(300 690) rotate(180) scale(1.0)"/>
    <use href="#koru" transform="translate(430 600) rotate(0) scale(1.25)"/>
    <use href="#koru" transform="translate(225 470) rotate(30) scale(0.8)"/>
    <use href="#koru" transform="translate(360 360) rotate(210) scale(0.7)"/>
    <use href="#koru" transform="translate(280 560) rotate(140) scale(0.9)"/>
    <use href="#koru" transform="translate(210 720) rotate(250) scale(0.85)"/>
    <use href="#koru" transform="translate(380 760) rotate(90) scale(1.05)"/>
    <use href="#koru" transform="translate(255 210) rotate(300) scale(0.65)"/>
    <use href="#koru" transform="translate(330 500) rotate(20) scale(0.6)"/>
    <use href="#koru" transform="translate(430 360) rotate(160) scale(0.75)"/>
    <use href="#koru" transform="translate(300 830) rotate(200) scale(0.7)"/>
    <use href="#sun" transform="translate(360 470) scale(1.0)"/>
    <use href="#sun" transform="translate(220 560) scale(1.0)"/>
    <use href="#sun" transform="translate(300 250) scale(0.8)"/>
    <use href="#sun" transform="translate(410 690) scale(0.9)"/>
    <use href="#sun" transform="translate(250 390) scale(0.75)"/>
    <use href="#sun" transform="translate(330 640) scale(0.85)"/>
      </g>
      <rect width="1024" height="1024" fill="url(#innerShade)"/>
      <rect width="1024" height="1024" fill="url(#sheen)"/>
    </g>
  </g>
</svg>
