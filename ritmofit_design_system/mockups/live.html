<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RitmoFit - Live Mode</title>
    <link
      rel="preload"
      href="fonts/sora-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/azeret-mono-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to current cue</a>
    <main class="live-shell" id="content">
      <header class="live-header">
        <div class="stack">
          <strong class="font-display">Saturday Rhythm Build</strong>
          <span class="timecode dim">11:42 / 25:31 · Track 4 of 6</span>
        </div>
        <div class="row gap-2 wrap" data-view-group>
          <button
            class="button button-action"
            data-view-option
            aria-pressed="true"
          >
            Cue-by-cue
          </button>
          <button
            class="button button-ghost"
            data-view-option
            aria-pressed="false"
          >
            Full list
          </button>
          <a class="button button-ghost" href="builder.html">Exit Live</a>
        </div>
      </header>

      <div class="live-body">
        <div class="live-hud">
          <section
            class="current-cue tempo-pulse-live is-all-out"
            aria-labelledby="current-cue-title"
          >
            <div class="row gap-3">
              <span class="eyebrow">Now · Zone 4 · All Out</span>
              <span class="intensity">
                <span class="zone-bars" data-zone="4"
                  ><i></i><i></i><i></i><i></i
                ></span>
                <span class="zone-copy">4 bars</span>
              </span>
            </div>
            <h1 class="current-cue-copy" id="current-cue-title">Drop in.</h1>
            <div class="current-cue-meta">
              <div class="stack gap-1">
                <strong>Attack · standing drive</strong>
                <span class="muted">8 counts to release</span>
              </div>
              <div class="live-bpm" aria-label="138 beats per minute">
                <strong>138</strong>
                <span>BPM</span>
              </div>
            </div>
          </section>

          <aside class="live-side stack gap-6" aria-label="Live class context">
            <section class="stack gap-1">
              <span class="section-label">Now playing</span>
              <span class="title-lg">Drop In</span>
              <span class="track-meta">Studio 84</span>
            </section>

            <section class="stack gap-1">
              <span class="section-label">Next cue in <strong class="data">0:18</strong></span>
              <h2 class="title-lg">Release. Find control.</h2>
            </section>

            <section class="stack gap-2">
              <div class="between">
                <span class="section-label">Track ends</span>
                <strong class="timecode">0:41</strong>
              </div>
              <div class="between">
                <span class="section-label">Class ends</span>
                <strong class="timecode">13:49</strong>
              </div>
            </section>
          </aside>
        </div>
      </div>

      <footer class="live-transport">
        <button class="button button-primary">Pause</button>
        <button class="button button-ghost">Reset</button>
        <div
          class="seek"
          data-seek
          data-seek-total="1531"
          role="slider"
          tabindex="0"
          aria-label="Class position"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="58"
          aria-valuetext="11:42 of 25:31"
        ></div>
        <span class="timecode" data-seek-readout>11:42 / 25:31</span>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
