packages:
  - 'packages/*'
  - 'apps/*'
# esbuild (Vite) and workerd (wrangler dev) need their postinstall to fetch
# platform binaries. sharp is pulled in transitively but unused.
allowBuilds:
  esbuild: true
  sharp: false
  workerd: true
# Pin undici to the patched line. Two advisories (GHSA-vmh5-mc38-953g high TLS
# cert-validation bypass, GHSA-pr7r-676h-xcf6 moderate shared-cache disclosure; both
# <7.28.0) reach us only via dev/test tooling (jsdom in vitest; miniflare/wrangler dev) —
# never the deployed Worker (workerd provides fetch) or the browser bundle. Unlike the
# esbuild/vite advisories below, undici IS fixable: 7.28.0 satisfies jsdom's ^7.25.0 and
# is a within-v7 bump over miniflare's pinned 7.24.8 (validated by the Worker/D1
# integration suite). Prefer the upgrade over an audit ignore (AGENTS.md §Engineering Rules).
overrides:
  undici: '^7.28.0'
# Dependency-audit exceptions (gate: `pnpm audit:ci`). All are dev/build-server
# advisories (esbuild & vite dev servers, reached only via vitest/drizzle-kit) — none
# reach the deployed Worker request handler or the browser bundle.
#
# Why these can't simply be upgraded away (investigated 2026-06-16):
#   • The vite advisories (<=6.4.2) require removing vite 5 from the whole tree. The API
#     pulls vite *only* via vitest, so it needs vitest 4 → @cloudflare/vitest-pool-workers
#     0.16, which dropped per-test storage isolation (now per-file; upstream
#     cloudflare/workers-sdk#12889). Our authz integration suite relies on per-test D1
#     rollback, so that bump makes the security regression net order-dependent/flaky.
#   • The esbuild advisories (<0.28.1) are NOT fixed by a vite major bump — vite 6/7 still
#     pin esbuild <0.28.1, as do wrangler, pool-workers, tsx, and drizzle-kit. The fix is
#     esbuild 0.28.1, not yet propagated through those tools. Forcing it via `overrides`
#     would also push esbuild into wrangler's production bundler.
# Revisit when pool-workers restores per-test isolation (#12889) and/or esbuild 0.28.1
# propagates. Any NEW advisory still fails the audit gate.
auditConfig:
  ignoreGhsas:
    - GHSA-67mh-4wv8-2f99 # esbuild moderate — dev server accepts any-origin requests (<=0.24.2)
    - GHSA-4w7w-66w2-5vf9 # vite moderate — dev server (<=6.4.1; we're on vite 5)
    - GHSA-gv7w-rqvm-qjhr # esbuild high — dev server (<0.28.1)
    - GHSA-g7r4-m6w7-qqqr # esbuild low — Windows dev-server file read (<0.28.1)
    - GHSA-fx2h-pf6j-xcff # vite high — server.fs.deny bypass on Windows alt paths (<=6.4.2; via vitest)
    - GHSA-v6wh-96g9-6wx3 # vite moderate — launch-editor NTLMv2 disclosure on Windows (<=6.4.2; via vitest)
minimumReleaseAgeExclude:
  - '@better-auth/core@1.6.17'
  - '@better-auth/drizzle-adapter@1.6.17'
  - '@better-auth/kysely-adapter@1.6.17'
  - '@better-auth/memory-adapter@1.6.17'
  - '@better-auth/mongo-adapter@1.6.17'
  - '@better-auth/prisma-adapter@1.6.17'
  - '@better-auth/telemetry@1.6.17'
  - better-auth@1.6.17
onlyBuiltDependencies:
  - esbuild
  - workerd
