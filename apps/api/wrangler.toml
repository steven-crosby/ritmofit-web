name = "ritmofit-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Keep the *.workers.dev URL alive (declaring a custom-domain route otherwise
# disables it). Handy for smoke tests; note auth only fully works on the canonical
# origin (BETTER_AUTH_URL), since the session cookie binds to that host.
workers_dev = true

# Custom domain — serves the whole app (SPA + API) at the branded apex. The zone
# `ritmofit.studio` must be on this Cloudflare account; `custom_domain = true`
# provisions the proxied DNS record + edge cert on deploy. `ritmofit.studio` is the
# canonical origin Better Auth binds its cookie/callbacks to (BETTER_AUTH_URL below).
[[routes]]
pattern = "ritmofit.studio"
custom_domain = true

# Non-secret config. Secrets (BETTER_AUTH_SECRET, ENCRYPTION_KEY, provider
# creds) are set via `wrangler secret put`, not here.
[vars]
BETTER_AUTH_URL = "https://ritmofit.studio"
WEB_ORIGIN = "https://ritmofit.studio"

# Serve the built web SPA (apps/web/dist) from this same Worker — single origin,
# so the session cookie is first-party and there's no CORS. The Worker runs first
# only for /api/* (Hono: REST + Better Auth); every other path is served from the
# static assets, with an SPA fallback to index.html for client-side routes.
# Build the SPA before deploying: `pnpm --filter @ritmofit/web build`.
[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Cloudflare D1 (SQLite), bound to the Worker as `DB`.
# Create the database once with:  wrangler d1 create ritmofit
# then paste the returned database_id below (it is NOT a secret).
[[d1_databases]]
binding = "DB"
database_name = "ritmofit"
database_id = "5bf15d82-10f5-4d03-b96e-6b8358334fc5"
migrations_dir = "migrations"

# Daily sweep that drains the provider metadata-purge queue (disconnect
# compliance — see src/lib/music/purge.ts). 03:17 UTC, off-peak.
[triggers]
crons = ["17 3 * * *"]

[observability]
enabled = true
