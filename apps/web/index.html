<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RitmoFit</title>
    <meta
      name="description"
      content="RitmoFit is a premium choreography and class-management tool for rhythm spin instructors."
    />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="RitmoFit" />
    <meta
      property="og:description"
      content="Premium choreography and class-management tool for rhythm spin instructors."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ritmofit.studio" />
    <meta property="og:image" content="https://ritmofit.studio/og-image.jpg" />

    <!-- PWA / Icons -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1a110d" />
    <!-- Matches the espresso dark background -->

    <!-- Self-hosted OFL fonts (no third-party CDN). Preload the two above-the-fold
         faces: Inter (UI) and Martian Mono (the data face — BPM is above the fold
         on the builder/Live). @font-face rules live in src/styles/fonts.css. -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link
      rel="preload"
      href="/fonts/martian-mono-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
