name: CI

# Quality gate for the pnpm monorepo: typecheck + lint + unit tests. Deploys stay
# manual by design (see CLAUDE.md) — this workflow never deploys, it only blocks
# regressions on PRs and pushes to main.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: format · typecheck · lint · test · build · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup reads the version from the root package.json
      # "packageManager" field (pnpm@11.4.0), so there's one source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Node 22 (pnpm 11.4 needs >=22.13)
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Prettier owns code + top-level docs; generated artifacts and long-form
      # reference docs are excluded in .prettierignore.
      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      # Design-system guard gate: tokens.json is the single source of truth, so
      # fail if the generated emitters (web/iOS) drifted, a token lint rule broke,
      # or a semantic color pair fell below its contrast floor. The package has no
      # dependencies, so `npm run verify` runs without an install.
      - name: Design system verify
        working-directory: ritmofit_design_system
        run: npm run verify

      - name: Test
        run: pnpm test

      # Route-level integration tests run the mounted worker against a real
      # (Miniflare) D1 with prod migrations applied — proves authz is enforced
      # end-to-end. Separate config/glob from the node-env unit suite above.
      - name: Integration tests (Workers pool + D1)
        run: pnpm --filter @ritmofit/api test:integration

      # `vite build` can fail where `tsc --noEmit` passes (asset/import
      # resolution), and deploys are manual — so catch build breaks in CI.
      - name: Build web
        run: pnpm --filter @ritmofit/web build

      # The OpenAPI spec is generated from the shared Zod schemas; fail if the
      # committed spec has drifted from a fresh regen.
      - name: OpenAPI spec up to date
        run: |
          pnpm --filter @ritmofit/api openapi
          git diff --exit-code apps/api/openapi/openapi.json

      # Production dependency audit. The four esbuild/vite advisories ignored in
      # the audit:ci script are dev/build-server only (not in the deployed Worker
      # or browser bundle) and unfixable without a vite 5→6 major upgrade; they
      # are documented in REVIEW.md. Any NEW advisory fails the build.
      - name: Dependency audit (prod)
        run: pnpm audit:ci
